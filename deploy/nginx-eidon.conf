# Eidon Nginx 配置
# 安装：拷到 /etc/nginx/sites-available/eidon，建软链到 sites-enabled，改 <...> 后
#   sudo nginx -t && sudo systemctl reload nginx
#
# 作用：托管前端静态文件（frontend/dist），并把 /api、/outputs、WebSocket
# 反代到本机后端 :8000。前端 api.ts 用相对路径 /api，因此同源即可工作。

server {
    listen 80;
    server_name _;   # 换成你的域名或公网 IP

    # 上传大视频/素材：放开请求体大小限制
    client_max_body_size 2048m;

    # 前端静态资源（npm run build 产物）
    root <项目路径>/Eidon/frontend/dist;
    index index.html;

    # SPA 路由回退
    location / {
        try_files $uri $uri/ /index.html;
    }

    # REST API → 后端
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # 长任务/转写：放宽超时
        proxy_read_timeout 1800s;
        proxy_send_timeout 1800s;
    }

    # 任务进度 WebSocket（/api/jobs/{id}/ws）
    location /api/jobs/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }

    # 成品视频下载/预览
    location /outputs/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_read_timeout 1800s;
    }
}
