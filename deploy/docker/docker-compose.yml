# ── Eidon 全栈 Docker Compose（Phase 1：Eidon 本体）──────────────────────────
# 用户安装 = 装 Docker Desktop → 复制 .env.docker.example 为 .env 填好 LLM key →
#   docker compose -f deploy/docker/docker-compose.yml up -d
# 国内构建加速：先 export CN=1，build 时传 --build-arg CN=$CN（见 README-Docker.md）。
#
# Phase 1 只含 backend + frontend，TTS 走免费 edge。数字人(HeyGem)/声音克隆
# (CosyVoice) 见文件底部「扩展位」注释，后续 Phase 接入。
#
# 关键约束：backend 单进程（task_manager 进程内单例），不要加副本/多 worker。

services:
  backend:
    build:
      context: ../..                         # build context = 项目根目录
      dockerfile: deploy/docker/Dockerfile.backend
      args:
        CN: ${CN:-0}
    image: eidon-backend
    restart: unless-stopped
    env_file:
      - .env                                 # 由 .env.docker.example 复制而来
    volumes:
      # 业务数据：成品/中间文件/素材/音色/人脸/BGM 持久化到命名卷
      - eidon-outputs:/app/outputs
      - eidon-temp:/app/temp
      - eidon-media:/app/media
      - eidon-bgm:/app/bgm
      - eidon-voices:/app/voices
      - eidon-avatars:/app/avatars
      # Whisper 模型缓存：避免重建容器时重下模型
      - whisper-cache:/root/.cache/whisper
    expose:
      - "8000"                               # 仅 compose 网络内暴露；对外由 frontend 反代
    # 直连后端调试用（可选）：取消注释把 8000 映射到宿主
    # ports:
    #   - "8000:8000"

  frontend:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.frontend
      args:
        CN: ${CN:-0}
    image: eidon-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"                              # 浏览器访问 http://localhost/

volumes:
  eidon-outputs:
  eidon-temp:
  eidon-media:
  eidon-bgm:
  eidon-voices:
  eidon-avatars:
  whisper-cache:

# ─────────────────────────────────────────────────────────────────────────────
# 扩展位（后续 Phase，先放注释，勿在 Phase 1 启用）
#
# Phase 2 — HeyGem 数字人（端口 8383，需 GPU）：
#   关键：backend 与 heygem 必须共享同一卷且【容器内路径一致】，因为 Eidon 把
#   音频/人脸视频的绝对路径传给 HeyGem，HeyGem 要按同一路径读到。做法是给两个
#   服务挂同一个卷到同一路径，例如都挂 eidon-temp、eidon-avatars 到 /app/temp、
#   /app/avatars。并在 .env 设 HEYGEM_HOST=http://heygem:8383。
#   heygem 服务需 GPU：
#     deploy:
#       resources:
#         reservations:
#           devices: [{capabilities: ["gpu"]}]
#
# Phase 3 — CosyVoice 声音克隆（端口 50000，需 GPU）：
#   cosyvoice 服务（见 Dockerfile.cosyvoice，待建），.env 设
#   COSYVOICE_HOST=http://cosyvoice:50000，模型用单独卷挂入。
# ─────────────────────────────────────────────────────────────────────────────
